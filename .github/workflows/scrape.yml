name: Scrape Tournament Data

on:
  # Run every day at 7:00 AM ET (11:00 UTC)
  schedule:
    - cron: "0 11 * * *"

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # needed to commit tournament_data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright httpx
          playwright install chromium
          playwright install-deps chromium

      - name: Extract tournament list from HTML
        run: python scraper/extract_tournaments.py

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated tournament_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournament_data.json scraper/tournament_list.py
          git diff --cached --quiet || git commit -m "chore: update tournament data [$(date -u '+%Y-%m-%d')]"
          git push
