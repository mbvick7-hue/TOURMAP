name: Scrape Tournament Data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright httpx
          playwright install chromium
          playwright install-deps chromium

      - name: Extract tournament list from HTML
        run: python scraper/extract_tournaments.py

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated tournament_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournament_data.json scraper/tournament_list.py new_tournaments_pending.json
          git diff --cached --quiet || git commit -m "chore: update tournament data [$(date -u '+%Y-%m-%d')]"
          git push
